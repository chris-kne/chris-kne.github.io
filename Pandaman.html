<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Panda Crypto Man</title>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:Arial;
touch-action:none;
overflow:hidden;
}

canvas{
background:#000;
border:4px solid #00ff99;
width:95vw;
height:65vh;
}

.controls{
margin-top:10px;
}

.controls button{
width:70px;
height:70px;
font-size:28px;
margin:6px;
border-radius:10px;
border:none;
background:#00ff99;
}

</style>

</head>

<body>

<h2>🐼 Panda Crypto Man</h2>

Score: <span id="score">0</span>

<br>

<canvas id="game" width="480" height="480"></canvas>

<div class="controls">

<button onclick="dir='left'">⬅</button>
<button onclick="dir='up'">⬆</button>
<button onclick="dir='down'">⬇</button>
<button onclick="dir='right'">➡</button>

</div>

<script>

document.addEventListener("touchmove", e => e.preventDefault(), {passive:false})

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

const tile = 24

let panda = {x:1,y:1}
let dir = "right"
let score = 0
let gameOver = false

const maze = [

"####################",
"#........#.........#",
"#.####...#...####..#",
"#..................#",
"#.####.#.#.#.####..#",
"#......#...#.......#",
"#.####.#####.####..#",
"#..................#",
"####################"

]

let dots=[]

maze.forEach((row,y)=>{
row.split("").forEach((c,x)=>{
if(c==".") dots.push({x,y})
})
})

document.addEventListener("keydown",e=>{
if(e.key=="ArrowLeft") dir="left"
if(e.key=="ArrowRight") dir="right"
if(e.key=="ArrowUp") dir="up"
if(e.key=="ArrowDown") dir="down"
})

function update(){

if(gameOver) return

let nx=panda.x
let ny=panda.y

if(dir=="left") nx--
if(dir=="right") nx++
if(dir=="up") ny--
if(dir=="down") ny++

if(maze[ny] && maze[ny][nx] !== "#"){
panda.x=nx
panda.y=ny
}

dots.forEach((d,i)=>{
if(d.x==panda.x && d.y==panda.y){
dots.splice(i,1)
score++
document.getElementById("score").innerText=score
}
})

if(dots.length===0){
gameOver=true
}

}

function draw(){

ctx.clearRect(0,0,480,480)

maze.forEach((row,y)=>{
row.split("").forEach((c,x)=>{
if(c=="#"){
ctx.fillStyle="#003333"
ctx.fillRect(x*tile,y*tile,tile,tile)
}
})
})

dots.forEach(d=>{
ctx.fillStyle="#00ff99"
ctx.beginPath()
ctx.arc(d.x*tile+12,d.y*tile+12,4,0,Math.PI*2)
ctx.fill()
})

ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(panda.x*tile+12,panda.y*tile+12,10,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="black"
ctx.beginPath()
ctx.arc(panda.x*tile+8,panda.y*tile+10,3,0,Math.PI*2)
ctx.arc(panda.x*tile+16,panda.y*tile+10,3,0,Math.PI*2)
ctx.fill()

if(gameOver){

ctx.fillStyle="white"
ctx.font="40px Arial"
ctx.fillText("LEVEL COMPLETE",90,220)

ctx.font="20px Arial"
ctx.fillText("Tap to restart",170,260)

}

}

let lastMove = 0
const speed = 150

function loop(time){

if(time-lastMove>speed){
update()
lastMove=time
}

draw()

requestAnimationFrame(loop)

}

canvas.addEventListener("click",()=>{
if(gameOver) location.reload()
})

loop()

</script>

</body>
</html>
