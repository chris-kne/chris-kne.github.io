
<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Panda Crypto Man</title>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:Arial;
touch-action:none;
overflow:hidden;
}

canvas{
background:#111;
border:4px solid #00ff99;
width:95vw;
height:65vh;
}

.controls{
margin-top:10px;
}

.controls button{
width:70px;
height:70px;
font-size:28px;
margin:6px;
border-radius:10px;
border:none;
background:#00ff99;
}

</style>

</head>

<body>

<h2>🐼 Panda Crypto Man</h2>

Score: <span id="score">0</span>

<br>

<canvas id="game" width="400" height="400"></canvas>

<div class="controls">

<button onclick="dir='left'">⬅</button>
<button onclick="dir='up'">⬆</button>
<button onclick="dir='down'">⬇</button>
<button onclick="dir='right'">➡</button>

</div>

<script>

document.addEventListener("touchmove", e => e.preventDefault(), {passive:false})

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let panda={x:200,y:200}

let dir="right"

let score=0

let coins=[]

let levelComplete=false

function spawnCoins(){

coins=[]

for(let i=0;i<40;i++){

coins.push({
x:Math.random()*380,
y:Math.random()*380
})

}

}

spawnCoins()

function update(){

if(levelComplete) return

if(dir=="left") panda.x-=3
if(dir=="right") panda.x+=3
if(dir=="up") panda.y-=3
if(dir=="down") panda.y+=3

if(panda.x<0) panda.x=400
if(panda.x>400) panda.x=0
if(panda.y<0) panda.y=400
if(panda.y>400) panda.y=0

coins.forEach((c,i)=>{

if(Math.abs(panda.x-c.x)<14 && Math.abs(panda.y-c.y)<14){

coins.splice(i,1)

score++

document.getElementById("score").innerText=score

}

})

if(coins.length===0){

levelComplete=true

}

}

function draw(){

ctx.clearRect(0,0,400,400)

/* coins */

coins.forEach(c=>{

ctx.fillStyle="#00ff99"

ctx.beginPath()

ctx.arc(c.x,c.y,4,0,Math.PI*2)

ctx.fill()

})

/* panda face */

ctx.fillStyle="white"

ctx.beginPath()

ctx.arc(panda.x,panda.y,16,0,Math.PI*2)

ctx.fill()

ctx.fillStyle="black"

/* ears */

ctx.beginPath()
ctx.arc(panda.x-10,panda.y-12,6,0,Math.PI*2)
ctx.arc(panda.x+10,panda.y-12,6,0,Math.PI*2)
ctx.fill()

/* eye patches */

ctx.beginPath()
ctx.ellipse(panda.x-6,panda.y-2,4,6,0,0,Math.PI*2)
ctx.ellipse(panda.x+6,panda.y-2,4,6,0,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="white"

/* eyes */

ctx.beginPath()
ctx.arc(panda.x-6,panda.y-2,2,0,Math.PI*2)
ctx.arc(panda.x+6,panda.y-2,2,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="black"

/* nose */

ctx.beginPath()
ctx.arc(panda.x,panda.y+5,2,0,Math.PI*2)
ctx.fill()

if(levelComplete){

ctx.fillStyle="white"

ctx.font="30px Arial"

ctx.fillText("LEVEL COMPLETE",70,200)

ctx.font="18px Arial"

ctx.fillText("Tap to play again",120,230)

}

}

canvas.addEventListener("click",()=>{

if(levelComplete){

spawnCoins()

levelComplete=false

}

})

let lastMove=0
const speed=40

function loop(time){

if(time-lastMove>speed){

update()

lastMove=time

}

draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
