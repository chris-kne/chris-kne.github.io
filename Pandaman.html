
<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Panda Crypto Man</title>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:Arial;
touch-action:none;
overflow:hidden;
}

canvas{
background:#000;
border:4px solid #00ff99;
width:95vw;
height:70vh;
}

.controls{
margin-top:10px;
}

.controls button{
width:70px;
height:70px;
font-size:28px;
margin:6px;
border-radius:10px;
border:none;
background:#00ff99;
}

.logo{
position:fixed;
bottom:10px;
width:60px;
opacity:0.8;
}

#logoLeft{ left:10px; }
#logoRight{ right:10px; }

</style>

</head>

<body>

<h2>🐼 Panda Crypto Man</h2>

Score: <span id="score">0</span>

<br>

<canvas id="game" width="480" height="480"></canvas>

<div class="controls">

<button onclick="dir='left'">⬅</button>
<button onclick="dir='up'">⬆</button>
<button onclick="dir='down'">⬇</button>
<button onclick="dir='right'">➡</button>

</div>

<img src="rabbit.png" class="logo" id="logoLeft">
<img src="rabbit.png" class="logo" id="logoRight">

<script>

document.addEventListener("touchmove", e => e.preventDefault(), {passive:false})

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

const size = 24

let panda = {x:1,y:1}
let dir = "right"
let score = 0

const maze = [

"####################",
"#........#.........#",
"#.####...#...####..#",
"#..................#",
"#.####.#.#.#.####..#",
"#......#...#.......#",
"#.####.#####.####..#",
"#..................#",
"####################"

]

let dots=[]

maze.forEach((row,y)=>{
row.split("").forEach((c,x)=>{
if(c==".") dots.push({x,y})
})
})

document.addEventListener("keydown",e=>{
if(e.key=="ArrowLeft") dir="left"
if(e.key=="ArrowRight") dir="right"
if(e.key=="ArrowUp") dir="up"
if(e.key=="ArrowDown") dir="down"
})

function update(){

let nx=panda.x
let ny=panda.y

if(dir=="left") nx--
if(dir=="right") nx++
if(dir=="up") ny--
if(dir=="down") ny++

if(maze[ny] && maze[ny][nx]!=""){
if(maze[ny][nx]!="#"){
panda.x=nx
panda.y=ny
}
}

dots.forEach((d,i)=>{
if(d.x==panda.x && d.y==panda.y){
dots.splice(i,1)
score++
document.getElementById("score").innerText=score
}
})

}

function draw(){

ctx.clearRect(0,0,480,480)

maze.forEach((row,y)=>{
row.split("").forEach((c,x)=>{
if(c=="#"){
ctx.fillStyle="#003333"
ctx.fillRect(x*size,y*size,size,size)
}
})
})

dots.forEach(d=>{
ctx.fillStyle="#00ff99"
ctx.beginPath()
ctx.arc(d.x*size+12,d.y*size+12,4,0,Math.PI*2)
ctx.fill()
})

ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(panda.x*size+12,panda.y*size+12,10,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="black"
ctx.beginPath()
ctx.arc(panda.x*size+8,panda.y*size+10,3,0,Math.PI*2)
ctx.arc(panda.x*size+16,panda.y*size+10,3,0,Math.PI*2)
ctx.fill()

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
