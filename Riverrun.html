<!DOCTYPE html>
<html>
<head>

<title>Panda River Crossing</title>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:Arial;
}

canvas{
background:#001a33;
border:4px solid #d4af37;
box-shadow:0 0 25px #d4af37;
margin-top:20px;
}

.controls button{
width:100px;
height:100px;
font-size:36px;
margin:8px;
border-radius:12px;
background:#2e8b57;
color:white;
border:3px solid #d4af37;
}

</style>

</head>

<body>

<h1>🐼 Panda River Crossing</h1>

<canvas id="game" width="800" height="800"></canvas>

<h2>Score: <span id="score">0</span></h2>

<div class="controls">

<br>
<button onclick="move(0,-50)">⬆</button>

<br>

<button onclick="move(-50,0)">⬅</button>
<button onclick="move(50,0)">➡</button>

<br>

<button onclick="move(0,50)">⬇</button>

</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let panda={x:380,y:720}

let score=0

let logs=[
{x:0,y:420,speed:3},
{x:300,y:340,speed:-3},
{x:200,y:260,speed:4},
{x:500,y:180,speed:-2}
]

document.addEventListener("keydown",e=>{

if(e.key=="ArrowUp") move(0,-50)
if(e.key=="ArrowDown") move(0,50)
if(e.key=="ArrowLeft") move(-50,0)
if(e.key=="ArrowRight") move(50,0)

})

function move(x,y){

panda.x+=x
panda.y+=y

}

function draw(){

ctx.clearRect(0,0,800,800)

ctx.fillStyle="green"
ctx.fillRect(0,0,800,100)

ctx.fillStyle="green"
ctx.fillRect(0,700,800,100)

ctx.fillStyle="blue"
ctx.fillRect(0,100,800,600)

ctx.fillStyle="white"
ctx.fillRect(panda.x,panda.y,40,40)

logs.forEach(log=>{

log.x+=log.speed

if(log.x>800) log.x=-150
if(log.x<-150) log.x=800

ctx.fillStyle="brown"
ctx.fillRect(log.x,log.y,150,40)

})

let safe=false

logs.forEach(log=>{

if(
panda.y===log.y &&
panda.x+40>log.x &&
panda.x<log.x+150
){

safe=true
panda.x+=log.speed

}

})

if(panda.y>100 && panda.y<700 && !safe){

alert("🐼 Splash!")

panda={x:380,y:720}

score=0
document.getElementById("score").innerText=score

}

if(panda.y<100){

score++

document.getElementById("score").innerText=score

panda={x:380,y:720}

}

ctx.fillStyle="black"
ctx.fillRect(panda.x+10,panda.y+10,8,8)
ctx.fillRect(panda.x+22,panda.y+10,8,8)

}

setInterval(draw,60)

</script>

</body>
</html>
