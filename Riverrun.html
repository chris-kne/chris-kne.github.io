<!DOCTYPE html>
<html>
<head>

<title>Panda River Crossing</title>

<style>

body{
background:#0a0a0a;
color:white;
text-align:center;
font-family:Arial;
}

canvas{
background:#001a33;
border:4px solid #d4af37;
box-shadow:0 0 20px #d4af37;
margin-top:20px;
}

.controls button{
width:90px;
height:90px;
font-size:28px;
margin:6px;
border-radius:12px;
background:linear-gradient(#3a7d3a,#1f4f1f);
color:white;
border:2px solid #d4af37;
}

</style>

</head>

<body>

<h2>🐼 Panda River Crossing</h2>

<canvas id="game" width="600" height="600"></canvas>

<h3>Score: <span id="score">0</span></h3>

<div class="controls">

<br>
<button onclick="move(0,-40)">⬆</button>

<br>

<button onclick="move(-40,0)">⬅</button>
<button onclick="move(40,0)">➡</button>

<br>

<button onclick="move(0,40)">⬇</button>

</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let panda={x:280,y:560}

let score=0

let logs=[
{x:0,y:300,speed:2},
{x:200,y:200,speed:-3},
{x:100,y:120,speed:2}
]

document.addEventListener("keydown",e=>{

if(e.key=="ArrowUp") move(0,-40)
if(e.key=="ArrowDown") move(0,40)
if(e.key=="ArrowLeft") move(-40,0)
if(e.key=="ArrowRight") move(40,0)

})

function move(x,y){

panda.x+=x
panda.y+=y

}

function draw(){

ctx.clearRect(0,0,600,600)

ctx.fillStyle="green"
ctx.fillRect(0,0,600,80)

ctx.fillStyle="green"
ctx.fillRect(0,520,600,80)

ctx.fillStyle="blue"
ctx.fillRect(0,80,600,440)

ctx.fillStyle="white"
ctx.fillRect(panda.x,panda.y,40,40)

logs.forEach(log=>{

log.x+=log.speed

if(log.x>600) log.x=-120
if(log.x<-120) log.x=600

ctx.fillStyle="brown"
ctx.fillRect(log.x,log.y,120,40)

})

if(panda.y<80){

score++
document.getElementById("score").innerText=score

panda.x=280
panda.y=560

}

}

setInterval(draw,60)

</script>

</body>
</html>
