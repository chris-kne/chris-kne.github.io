<!DOCTYPE html>
<html>
<head>
<title>Panda River Crossing</title>

<style>
body{
background:black;
color:white;
text-align:center;
font-family:Arial;
}

canvas{
background:#1e5c85;
border:4px solid gold;
box-shadow:0 0 20px gold;
display:block;
margin:auto;
}

button{
font-size:24px;
margin:10px;
padding:10px 20px;
background:#2ecc71;
border:none;
border-radius:10px;
color:white;
}
</style>
</head>

<body>

<h2>🐼 Panda River Crossing</h2>

<canvas id="game" width="350" height="500"></canvas>

<br>

<button onclick="move(-1)">⬅</button>
<button onclick="jump()">⬆</button>
<button onclick="move(1)">➡</button>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let panda={
x:175,
y:450,
size:20
}

let logs=[
{x:40,y:380,w:100},
{x:200,y:300,w:100},
{x:80,y:220,w:100},
{x:200,y:140,w:100}
]

function draw(){

ctx.clearRect(0,0,350,500)

logs.forEach(log=>{
ctx.fillStyle="#c9a14a"
ctx.fillRect(log.x,log.y,log.w,15)
})

ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(panda.x,panda.y,panda.size,0,Math.PI*2)
ctx.fill()

}

function move(dir){
panda.x+=dir*25
}

function jump(){

panda.y-=80

for(let log of logs){

if(
panda.x>log.x &&
panda.x<log.x+log.w &&
panda.y>log.y-30 &&
panda.y<log.y+30
){
score++
}
}

if(panda.y<40){
alert("YOU WIN 🐼")
location.reload()
}

}

setInterval(draw,30)

</script>

</body>
</html>
