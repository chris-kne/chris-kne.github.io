<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

<title>Panda River Crossing</title>

<style>

body{
background:#0b0b0b;
color:white;
text-align:center;
font-family:Arial;
touch-action:none;
overflow:hidden;
}

canvas{
background:#003355;
border:4px solid #d4af37;
box-shadow:0 0 25px #d4af37;
margin-top:10px;
width:95vw;
height:60vh;
}

.controls{
margin-top:10px;
}

.controls button{
width:70px;
height:70px;
font-size:28px;
margin:6px;
border-radius:12px;
background:#2e8b57;
color:white;
border:3px solid #d4af37;
}

</style>

</head>

<body>

<h2>🐼 Panda River Crossing</h2>

<canvas id="game" width="800" height="600"></canvas>

<h3>Score: <span id="score">0</span></h3>

<div class="controls">

<button onclick="move(0,-80)">⬆</button>

<br>

<button onclick="move(-80,0)">⬅</button>
<button onclick="move(80,0)">➡</button>

<br>

<button onclick="move(0,80)">⬇</button>

</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let panda={x:380,y:520}

let score=0

/* bamboo logs */

let logs=[

{x:0,y:420,speed:1.6},
{x:260,y:420,speed:1.6},

{x:150,y:340,speed:-1.4},
{x:520,y:340,speed:-1.4},

{x:100,y:260,speed:1.9},
{x:460,y:260,speed:1.9},

{x:50,y:180,speed:-1.2},
{x:400,y:180,speed:-1.2}

]

document.addEventListener("keydown",e=>{

if(e.key=="ArrowUp") move(0,-80)
if(e.key=="ArrowDown") move(0,80)
if(e.key=="ArrowLeft") move(-80,0)
if(e.key=="ArrowRight") move(80,0)

})

function move(x,y){

panda.x+=x
panda.y+=y

if(panda.x<0)panda.x=0
if(panda.x>760)panda.x=760
if(panda.y>520)panda.y=520

}

function drawPanda(x,y){

/* head */

ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(x+20,y+25,20,0,Math.PI*2)
ctx.fill()

/* ears */

ctx.fillStyle="black"
ctx.beginPath()
ctx.arc(x+6,y+8,8,0,Math.PI*2)
ctx.arc(x+34,y+8,8,0,Math.PI*2)
ctx.fill()

/* eye patches */

ctx.beginPath()
ctx.arc(x+12,y+24,7,0,Math.PI*2)
ctx.arc(x+28,y+24,7,0,Math.PI*2)
ctx.fill()

/* eyes */

ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(x+12,y+24,3,0,Math.PI*2)
ctx.arc(x+28,y+24,3,0,Math.PI*2)
ctx.fill()

/* nose */

ctx.fillStyle="black"
ctx.beginPath()
ctx.arc(x+20,y+32,3,0,Math.PI*2)
ctx.fill()

}

function draw(){

ctx.clearRect(0,0,800,600)

/* grass */

ctx.fillStyle="#2e8b57"
ctx.fillRect(0,0,800,80)
ctx.fillRect(0,520,800,80)

/* river */

ctx.fillStyle="#004477"
ctx.fillRect(0,80,800,440)

/* bamboo logs */

logs.forEach(log=>{

log.x+=log.speed

if(log.x>800) log.x=-200
if(log.x<-200) log.x=800

ctx.fillStyle="#c2a34a"
ctx.fillRect(log.x,log.y,200,40)

/* bamboo rings */

ctx.fillStyle="#8b7a2f"

for(let i=0;i<4;i++){
ctx.fillRect(log.x+(i*50),log.y,6,40)
}

})

/* panda */

drawPanda(panda.x,panda.y)

/* check log safety */

let safe=false

logs.forEach(log=>{

if(
panda.y===log.y &&
panda.x+40>log.x &&
panda.x<log.x+200
){

safe=true
panda.x+=log.speed

}

})

if(panda.y>80 && panda.y<520 && !safe){

alert("🐼 Splash!")

panda={x:380,y:520}

score=0
document.getElementById("score").innerText=score

}

/* reach top */

if(panda.y<80){

score++

document.getElementById("score").innerText=score

panda={x:380,y:520}

}

}

setInterval(draw,60)

</script>

</body>
</html>
