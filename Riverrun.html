<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Panda River Crossing</title>

<style>

body{
background:#0c0c0c;
color:white;
text-align:center;
font-family:Arial;
touch-action:none;
overflow:hidden;
}

canvas{
background:#003b5c;
border:4px solid #d4af37;
width:95vw;
height:60vh;
}

.controls{
margin-top:10px;
}

.controls button{
width:90px;
height:90px;
font-size:36px;
margin:8px;
border-radius:12px;
background:#2e8b57;
color:white;
border:3px solid #d4af37;
}

</style>

</head>

<body>

<h2>🐼 Panda River Crossing</h2>

<canvas id="game" width="800" height="600"></canvas>

<h3>Score: <span id="score">0</span></h3>

<div class="controls">

<button onclick="move(0,-80)">⬆</button>

<br>

<button onclick="move(-80,0)">⬅</button>
<button onclick="move(80,0)">➡</button>

<br>

<button onclick="move(0,80)">⬇</button>

</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let panda={x:380,y:520}

let score=0

/* aligned log rows */

let logs=[

{x:0,y:440,speed:1.4},
{x:200,y:440,speed:1.4},
{x:400,y:440,speed:1.4},
{x:600,y:440,speed:1.4},

{x:100,y:360,speed:-1.3},
{x:300,y:360,speed:-1.3},
{x:500,y:360,speed:-1.3},

{x:0,y:280,speed:1.6},
{x:200,y:280,speed:1.6},
{x:400,y:280,speed:1.6},
{x:600,y:280,speed:1.6},

{x:100,y:200,speed:-1.2},
{x:300,y:200,speed:-1.2},
{x:500,y:200,speed:-1.2}

]



document.addEventListener("keydown",e=>{

if(e.key=="ArrowUp") move(0,-80)
if(e.key=="ArrowDown") move(0,80)
if(e.key=="ArrowLeft") move(-80,0)
if(e.key=="ArrowRight") move(80,0)

})

function move(x,y){

panda.x+=x
panda.y+=y

if(panda.x<0)panda.x=0
if(panda.x>760)panda.x=760
if(panda.y>520)panda.y=520

}

function drawPanda(x,y){

ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(x+20,y+25,20,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="black"

ctx.beginPath()
ctx.arc(x+8,y+8,8,0,Math.PI*2)
ctx.arc(x+32,y+8,8,0,Math.PI*2)
ctx.fill()

ctx.beginPath()
ctx.ellipse(x+12,y+24,6,8,0,0,Math.PI*2)
ctx.ellipse(x+28,y+24,6,8,0,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="white"

ctx.beginPath()
ctx.arc(x+12,y+24,3,0,Math.PI*2)
ctx.arc(x+28,y+24,3,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="black"
ctx.beginPath()
ctx.arc(x+20,y+32,3,0,Math.PI*2)
ctx.fill()

}

function drawBamboo(log){

ctx.fillStyle="#d2b55b"
ctx.fillRect(log.x,log.y,200,40)

ctx.fillStyle="#8a7425"

for(let i=0;i<4;i++){
ctx.fillRect(log.x+(i*50),log.y,6,40)
}

}

function draw(){

ctx.clearRect(0,0,800,600)

/* grass */

ctx.fillStyle="#2e8b57"
ctx.fillRect(0,0,800,80)
ctx.fillRect(0,520,800,80)

/* river */

ctx.fillStyle="#004477"
ctx.fillRect(0,80,800,440)

/* logs */

logs.forEach(log=>{

log.x+=log.speed

if(log.x>800) log.x=-200
if(log.x<-200) log.x=800

drawBamboo(log)

})

drawPanda(panda.x,panda.y)

/* log check */

let safe=false

logs.forEach(log=>{

if(
panda.y===log.y &&
panda.x+40>log.x &&
panda.x<log.x+200
){

safe=true
panda.x+=log.speed

}

})

if(panda.y>80 && panda.y<520 && !safe){

alert("🐼 Splash!")

panda={x:380,y:520}

score=0
document.getElementById("score").innerText=score

}

if(panda.y<80){

score++

document.getElementById("score").innerText=score

panda={x:380,y:520}

}

}

setInterval(draw,60)

</script>

</body>
</html>
