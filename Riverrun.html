<!DOCTYPE html>
<html>
<head>
<title>Panda River Crossing</title>

<style>
body{
background:black;
color:white;
text-align:center;
font-family:sans-serif;
}

h1{
margin-top:10px;
}

canvas{
background:#0b4f7a;
border:6px solid gold;
box-shadow:0 0 20px gold;
border-radius:10px;
}

.controls{
margin-top:15px;
}

button{
font-size:30px;
padding:15px 25px;
margin:5px;
border-radius:10px;
border:none;
background:#3a8f5a;
color:white;
}
</style>
</head>

<body>

<h1>🐼 Panda River Crossing</h1>

<canvas id="game" width="360" height="500"></canvas>

<h2 id="score">Score: 0</h2>

<div class="controls">
<button onclick="moveLeft()">⬅</button>
<button onclick="moveUp()">⬆</button>
<button onclick="moveRight()">➡</button>
</div>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let panda = {
x:180,
y:450,
size:28
}

let score = 0

let logs = [
{y:380,x:0,speed:1},
{y:300,x:200,speed:-1.2},
{y:220,x:100,speed:1.5},
{y:140,x:50,speed:-1}
]

function drawPanda(){

ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(panda.x,panda.y,panda.size,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="black"

ctx.beginPath()
ctx.arc(panda.x-10,panda.y-10,7,0,Math.PI*2)
ctx.arc(panda.x+10,panda.y-10,7,0,Math.PI*2)
ctx.fill()

ctx.beginPath()
ctx.arc(panda.x-6,panda.y,3,0,Math.PI*2)
ctx.arc(panda.x+6,panda.y,3,0,Math.PI*2)
ctx.fill()

}

function drawLogs(){

ctx.fillStyle="#caa74f"

logs.forEach(log=>{

ctx.fillRect(log.x,log.y,120,20)

log.x+=log.speed

if(log.x>canvas.width) log.x=-120
if(log.x<-120) log.x=canvas.width

})
}

function drawRiver(){

ctx.fillStyle="#0b4f7a"
ctx.fillRect(0,80,360,350)

ctx.fillStyle="#2e8b57"
ctx.fillRect(0,0,360,80)

ctx.fillRect(0,430,360,70)

}

function update(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawRiver()
drawLogs()
drawPanda()

requestAnimationFrame(update)

}

function moveUp(){

panda.y -= 40
score++

document.getElementById("score").innerText="Score: "+score

if(panda.y < 80){
alert("YOU WIN 🐼")
location.reload()
}

}

function moveLeft(){

panda.x -= 40
}

function moveRight(){

panda.x += 40
}

update()

</script>

</body>
</html>
