<!DOCTYPE html><html>
<head>
<title>Panda River Crossing</title><style>
body{
background:black;
color:white;
text-align:center;
font-family:sans-serif;
}

canvas{
background:#1c5d87;
border:6px solid gold;
box-shadow:0 0 20px gold;
border-radius:10px;
}

.controls{
margin-top:15px;
}

button{
font-size:28px;
padding:14px 22px;
margin:6px;
border-radius:10px;
border:none;
background:#2e8b57;
color:white;
}
</style></head><body><h2>🐼 Panda River Crossing</h2><canvas id="game" width="380" height="520"></canvas>

<h3 id="score">Score: 0</h3><div class="controls">
<button onclick="left()">⬅</button>
<button onclick="up()">⬆</button>
<button onclick="right()">➡</button>
</div><script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let panda = {x:190,y:460,size:22}
let score = 0

let logs = [
{y:380,x:0,speed:1.5},
{y:300,x:200,speed:-1.3},
{y:220,x:120,speed:1.7},
{y:140,x:260,speed:-1.4}
]

function drawRiver(){

ctx.fillStyle="#3a915e"
ctx.fillRect(0,0,380,80)

ctx.fillStyle="#1c5d87"
ctx.fillRect(0,80,380,360)

ctx.fillStyle="#3a915e"
ctx.fillRect(0,440,380,80)

}

function drawLogs(){

logs.forEach(log=>{

ctx.fillStyle="#caa74f"
ctx.fillRect(log.x,log.y,220,22)

ctx.strokeStyle="#8d742f"
ctx.lineWidth=4

for(let i=0;i<220;i+=35){
ctx.beginPath()
ctx.moveTo(log.x+i,log.y)
ctx.lineTo(log.x+i,log.y+22)
ctx.stroke()
}

log.x += log.speed

if(log.x>380) log.x=-220
if(log.x<-220) log.x=380

})

}

function drawPanda(){

ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(panda.x,panda.y,panda.size,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="black"

ctx.beginPath()
ctx.arc(panda.x-8,panda.y-10,6,0,Math.PI*2)
ctx.arc(panda.x+8,panda.y-10,6,0,Math.PI*2)
ctx.fill()

ctx.beginPath()
ctx.arc(panda.x-5,panda.y,3,0,Math.PI*2)
ctx.arc(panda.x+5,panda.y,3,0,Math.PI*2)
ctx.fill()

}

function checkRiver(){

if(panda.y<440 && panda.y>80){

let safe=false

logs.forEach(log=>{

if(
panda.y>log.y-15 &&
panda.y<log.y+25 &&
panda.x>log.x &&
panda.x<log.x+220
){

safe=true
panda.x += log.speed

}

})

if(!safe){
alert("🌊 SPLASH")
location.reload()
}

}

}

function update(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawRiver()
drawLogs()
drawPanda()

checkRiver()

requestAnimationFrame(update)

}

function up(){

panda.y -= 40
score++

document.getElementById("score").innerText="Score: "+score

if(panda.y<90){
alert("🏆 YOU WIN")
location.reload()
}

}

function left(){
panda.x -= 40
if(panda.x<0) panda.x=0
}

function right(){
panda.x += 40
if(panda.x>380) panda.x=380
}

update()

</script></body>
</html>
