<!DOCTYPE html>
<html>
<head>

<title>Dragon Pearl</title>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:Arial;
}

canvas{
background:#020010;
border:3px solid purple;
box-shadow:0 0 25px purple;
margin-top:20px;
}

button{
padding:10px;
margin:5px;
}

</style>

</head>

<body>

<h1>🐉 Dragon Pearl</h1>

<canvas id="game" width="800" height="800"></canvas>

<h2>Score: <span id="score">0</span></h2>

<input id="playerName" placeholder="Your name">

<button onclick="submitScore()">Submit Score</button>
<button onclick="restart()">Restart</button>

<h3>Leaderboard</h3>

<ul id="leaderboard"></ul>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let dragon
let pearl
let dx
let dy
let score
let running

const grid = 40   // bigger grid for bigger screen

function start(){

dragon=[{x:400,y:400}]
pearl=randomPearl()

dx=grid
dy=0

score=0
running=true

document.getElementById("score").innerText=score

}

function randomPearl(){

return{
x:Math.floor(Math.random()*20)*grid,
y:Math.floor(Math.random()*20)*grid
}

}

document.addEventListener("keydown",function(e){

if(e.key=="ArrowUp"){dx=0;dy=-grid}
if(e.key=="ArrowDown"){dx=0;dy=grid}
if(e.key=="ArrowLeft"){dx=-grid;dy=0}
if(e.key=="ArrowRight"){dx=grid;dy=0}

})

function drawDragon(){

dragon.forEach((part,i)=>{

ctx.fillStyle = (i==0) ? "orange" : "lime"

ctx.fillRect(part.x,part.y,grid,grid)

})

}

function drawPearl(){

ctx.fillStyle="gold"

ctx.beginPath()
ctx.arc(pearl.x+grid/2,pearl.y+grid/2,grid/3,0,Math.PI*2)
ctx.fill()

}

function game(){

if(!running) return

ctx.clearRect(0,0,800,800)

let head={x:dragon[0].x+dx,y:dragon[0].y+dy}

if(head.x<0 || head.x>=800 || head.y<0 || head.y>=800){

gameOver()
return

}

for(let part of dragon){

if(part.x==head.x && part.y==head.y){

gameOver()
return

}

}

dragon.unshift(head)

if(head.x==pearl.x && head.y==pearl.y){

score++

document.getElementById("score").innerText=score

pearl=randomPearl()

}else{

dragon.pop()

}

drawDragon()
drawPearl()

}

function gameOver(){

running=false

ctx.fillStyle="red"
ctx.font="60px Arial"
ctx.fillText("GAME OVER",250,400)

}

function restart(){

start()

}

setInterval(game,120)


// leaderboard

function submitScore(){

let name=document.getElementById("playerName").value

let scores=JSON.parse(localStorage.getItem("dragonScores"))||[]

scores.push({name:name,score:score})

scores.sort((a,b)=>b.score-a.score)

scores=scores.slice(0,10)

localStorage.setItem("dragonScores",JSON.stringify(scores))

showScores()

}

function showScores(){

let scores=JSON.parse(localStorage.getItem("dragonScores"))||[]

let list=document.getElementById("leaderboard")

list.innerHTML=""

scores.forEach(s=>{

let li=document.createElement("li")

li.innerText=s.name+" - "+s.score

list.appendChild(li)

})

}

showScores()

start()

</script>

</body>
</html>
