<!DOCTYPE html>
<html>
<head>

<title>Dragon Pearl</title>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:Arial;
}

canvas{
background:#020010;
border:3px solid purple;
box-shadow:0 0 25px purple;
margin-top:20px;
}

.controls button{
width:80px;
height:80px;
font-size:24px;
margin:6px;
}

</style>

</head>

<body>

<h1>🐉 Dragon Pearl</h1>

<canvas id="game" width="600" height="600"></canvas>

<h2>Score: <span id="score">0</span></h2>

<div class="controls">

<br>
<button onclick="setDir(0,-20)">⬆</button>
<br>

<button onclick="setDir(-20,0)">⬅</button>
<button onclick="setDir(20,0)">➡</button>

<br>
<button onclick="setDir(0,20)">⬇</button>

</div>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let dragon=[{x:300,y:300}]
let pearl={x:200,y:200}

let dx=20
let dy=0

let score=0

function setDir(x,y){
dx=x
dy=y
}

document.addEventListener("keydown",function(e){

if(e.key=="ArrowUp") setDir(0,-20)
if(e.key=="ArrowDown") setDir(0,20)
if(e.key=="ArrowLeft") setDir(-20,0)
if(e.key=="ArrowRight") setDir(20,0)

})

function drawDragon(){

dragon.forEach((part,i)=>{

ctx.fillStyle = (i==0) ? "orange" : "lime"

ctx.fillRect(part.x,part.y,20,20)

})

}

function drawPearl(){

ctx.fillStyle="gold"

ctx.beginPath()
ctx.arc(pearl.x+10,pearl.y+10,8,0,Math.PI*2)
ctx.fill()

}

function game(){

ctx.clearRect(0,0,600,600)

let head={
x:dragon[0].x+dx,
y:dragon[0].y+dy
}


// wrap around screen

if(head.x < 0) head.x = 580
if(head.x >= 600) head.x = 0
if(head.y < 0) head.y = 580
if(head.y >= 600) head.y = 0


for(let part of dragon){

if(part.x==head.x && part.y==head.y){

alert("Game Over")

dragon=[{x:300,y:300}]
score=0
document.getElementById("score").innerText=score

return

}

}

dragon.unshift(head)

if(head.x==pearl.x && head.y==pearl.y){

score++

document.getElementById("score").innerText=score

pearl={
x:Math.floor(Math.random()*30)*20,
y:Math.floor(Math.random()*30)*20
}

}else{

dragon.pop()

}

drawDragon()
drawPearl()

}

setInterval(game,120)

</script>

</body>
</html>
