<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dragon Pearl</title>

<style>
body{
    margin:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

canvas{
    border:6px solid gold;
    background:#000014;
    max-width:95vw;
    max-height:90vh;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 400;
canvas.height = 400;

let dragon = {x:200,y:200,size:20};
let pearl = {x:100,y:100,size:10};

let dx=0;
let dy=0;

document.addEventListener("keydown",e=>{
 if(e.key=="ArrowUp"){dx=0;dy=-5}
 if(e.key=="ArrowDown"){dx=0;dy=5}
 if(e.key=="ArrowLeft"){dx=-5;dy=0}
 if(e.key=="ArrowRight"){dx=5;dy=0}
});

function spawnPearl(){
 pearl.x = Math.random()*380;
 pearl.y = Math.random()*380;
}

function drawDragon(){
 ctx.fillStyle="lime";
 ctx.beginPath();
 ctx.arc(dragon.x,dragon.y,dragon.size,0,Math.PI*2);
 ctx.fill();
}

function drawPearl(){
 ctx.fillStyle="gold";
 ctx.beginPath();
 ctx.arc(pearl.x,pearl.y,pearl.size,0,Math.PI*2);
 ctx.fill();
}

function update(){

 dragon.x+=dx;
 dragon.y+=dy;

 if(dragon.x<0)dragon.x=0;
 if(dragon.y<0)dragon.y=0;
 if(dragon.x>400)dragon.x=400;
 if(dragon.y>400)dragon.y=400;

 let dist=Math.hypot(dragon.x-pearl.x,dragon.y-pearl.y);

 if(dist<25){
  spawnPearl();
 }

}

function gameLoop(){

 ctx.clearRect(0,0,canvas.width,canvas.height);

 update();
 drawDragon();
 drawPearl();

 requestAnimationFrame(gameLoop);

}

gameLoop();

</script>

</body>
</html>
